name: Build Website

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node installieren
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Dependencies installieren
        run: npm i

      # 🔥 Figma Imports ersetzen
      - name: Fix figma asset imports
        run: |
          find src -type f -name "*.ts" -o -name "*.tsx" | while read file; do
            sed -i 's|figma:asset/|/assets/|g' "$file"
          done

      - name: Projekt bauen
        run: npm run build

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: website-build
          path: dist
